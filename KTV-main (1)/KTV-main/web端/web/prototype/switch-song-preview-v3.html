<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切歌视觉反馈 v3 — 组合方案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
:root {
  --p: #6750A4; --p20: rgba(103,80,164,0.2); --p12: rgba(103,80,164,0.12);
  --on-p: #fff; --s: #FFFBFE; --sc: #F3EDF7; --on-s: #1C1B1F; --ov: #49454F;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--s);color:var(--on-s);padding:40px 40px 120px}
h1{text-align:center;font-size:30px;font-weight:900;margin-bottom:6px}
.sub{text-align:center;font-size:13px;color:var(--ov);margin-bottom:44px}

/* Playlist */
.pl{background:var(--sc);border-radius:18px;padding:10px;width:380px;margin-bottom:48px}
.row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;position:relative;overflow:hidden;transition:background .2s,opacity .3s;user-select:none}
.row:hover{background:rgba(0,0,0,.04)}
.row .eq-col{width:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.row .n{width:18px;font-size:12px;color:var(--ov);text-align:center;flex-shrink:0}
.row .cv{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#6750A4,#EADDFF);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.row .cv .mi{font-size:18px;color:rgba(255,255,255,.7)}
.row .inf{flex:1;min-width:0}
.row .tt{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.row .ar{font-size:11px;color:var(--ov)}

/* Playing state */
.row.on{background:var(--p12)}
.row.on .n{color:var(--p);font-weight:700}
.row.on .tt{color:var(--p)}

/* EQ bars — persistent playing indicator */
.eq-bars{display:flex;gap:2px;align-items:flex-end;height:14px}
.eq-bar{width:2.5px;border-radius:1px;background:var(--p)}
.eq-bar:nth-child(1){animation:eqB .5s ease-in-out infinite alternate}
.eq-bar:nth-child(2){animation:eqB .6s ease-in-out infinite alternate .15s}
.eq-bar:nth-child(3){animation:eqB .45s ease-in-out infinite alternate .3s}
@keyframes eqB{0%{height:3px}100%{height:14px}}

/* Mini player bar */
.mplayer{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;padding:0 20px;z-index:100;transition:border-color .3s,box-shadow .3s}
.mplayer .mcv{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#6750A4,#EADDFF);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.mplayer .mcv .mi{font-size:22px;color:rgba(255,255,255,.8)}
.mplayer .minf{flex:1}
.mplayer .mtt{font-size:14px;font-weight:700}
.mplayer .mar{font-size:11px;color:var(--ov)}
.mplayer .mctrl{display:flex;gap:16px;align-items:center}
.mplayer .mctrl button{background:none;border:none;cursor:pointer;color:var(--p);display:flex;align-items:center}

/* Player catch pulse */
.mplayer .mcv.catch{animation:catchPulse .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes catchPulse{0%{transform:scale(.82)}60%{transform:scale(1.1)}100%{transform:scale(1)}}

/* Player bar glow on switch */
.mplayer.bar-glow{border-top-color:var(--p);box-shadow:0 -3px 16px var(--p20)}

/* ===== Combined: Takeover + CoverFly + EQ + WeakSpotlight ===== */

/* 1. Dual-phase takeover */
/* Phase A: old song fades (150ms) */
.row.takeover-old{animation:oldFade .15s ease forwards}
@keyframes oldFade{to{opacity:.55;transform:scale(.97)}}

/* Phase B: new song rises in */
.row.takeover-new{animation:newRise .4s cubic-bezier(.4,0,.2,1) forwards}
@keyframes newRise{
  0%{opacity:.6;transform:scale(.96) translateY(4px)}
  50%{opacity:1;transform:scale(1.01) translateY(0)}
  100%{transform:scale(1);opacity:1}
}

/* Glow on new song */
.row.takeover-glow{animation:glowPulse .5s ease forwards}
@keyframes glowPulse{
  0%{box-shadow:0 0 0 0 var(--p20)}
  40%{box-shadow:0 0 14px 5px var(--p20)}
  100%{box-shadow:0 0 0 0 transparent}
}

/* 2. Cover fly — FLIP + transform only */
.fly-cover{position:fixed;z-index:200;pointer-events:none;border-radius:8px;background:linear-gradient(135deg,#6750A4,#EADDFF);overflow:hidden;will-change:transform,opacity;box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* 3. Weak spotlight — other songs dim briefly */
.row.spotlight-dim{opacity:.8;transition:opacity .15s}

.reset-btn{padding:6px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:11px;cursor:pointer;margin-bottom:12px}
.reset-btn:hover{border-color:var(--p);color:var(--p)}

/* Label for each demo section */
.demo-label{font-size:12px;font-weight:700;color:var(--p);background:var(--p12);padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:10px}
</style>
</head>
<body>

<h1>切歌视觉反馈 v3 — 组合方案</h1>
<p class="sub">Takeover + Cover Fly + EQ Bars 常驻 + 弱 Spotlight</p>

<div class="demo-label">完整组合（推荐）</div>
<p style="font-size:12px;color:var(--ov);margin-bottom:16px">旧歌轻退 → 新歌接管 glow → 封面飞入播放器 → 其它歌短暂微暗 → EQ bars 常驻</p>
<button class="reset-btn" onclick="resetAll()">重置</button>
<div class="pl" id="pl"></div>

<!-- Mini player bar -->
<div class="mplayer" id="mplayer">
  <div class="mcv" id="mcv"><span class="mi material-symbols-outlined">music_note</span></div>
  <div class="minf">
    <div class="mtt" id="mtt">夜曲</div>
    <div class="mar">周杰伦</div>
  </div>
  <div class="mctrl">
    <button><span class="material-symbols-outlined">skip_previous</span></button>
    <button><span class="material-symbols-outlined" style="font-size:32px">play_circle</span></button>
    <button><span class="material-symbols-outlined">skip_next</span></button>
  </div>
</div>

<script>
const S = [
  {t:'夜曲',a:'周杰伦'},{t:'晴天',a:'周杰伦'},{t:'稻香',a:'周杰伦'},
  {t:'七里香',a:'周杰伦'},{t:'青花瓷',a:'周杰伦'},{t:'简单爱',a:'周杰伦'},
  {t:'告白气球',a:'周杰伦'},{t:'东风破',a:'周杰伦'},
];

let active = 0;

function build(idx) {
  const pl = document.getElementById('pl');
  pl.innerHTML = '';
  S.forEach((s, i) => {
    const r = document.createElement('div');
    r.className = 'row' + (i === idx ? ' on' : '');
    r.dataset.i = i;

    // EQ column (only for playing song)
    const eqCol = document.createElement('div');
    eqCol.className = 'eq-col';
    if (i === idx) {
      const eq = document.createElement('div');
      eq.className = 'eq-bars';
      eq.innerHTML = '<div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>';
      eqCol.appendChild(eq);
    }
    r.appendChild(eqCol);

    const n = document.createElement('span');
    n.className = 'n';
    if (i === idx) {
      const ic = document.createElement('span');
      ic.className = 'material-symbols-outlined';
      ic.style.fontSize = '16px'; ic.textContent = 'play_circle';
      n.appendChild(ic);
    } else { n.textContent = i + 1; }
    r.appendChild(n);

    const cv = document.createElement('div');
    cv.className = 'cv';
    cv.innerHTML = '<span class="mi material-symbols-outlined">music_note</span>';
    r.appendChild(cv);

    const inf = document.createElement('div');
    inf.className = 'inf';
    inf.innerHTML = '<div class="tt">' + s.t + '</div><div class="ar">' + s.a + '</div>';
    r.appendChild(inf);

    pl.appendChild(r);
  });
}

function updatePlayer(s) {
  document.getElementById('mtt').textContent = s.t;
}

// ===== Combined switch =====
document.getElementById('pl').addEventListener('click', e => {
  const r = e.target.closest('.row');
  if (!r) return;
  const i = +r.dataset.i;
  if (i === active) return;

  const oldIdx = active;
  active = i;

  // --- Phase 1: Old song fade (immediate) ---
  const rows = document.getElementById('pl').querySelectorAll('.row');
  const oldRow = rows[oldIdx];
  if (oldRow) {
    oldRow.classList.add('takeover-old');
  }

  // --- Weak spotlight: dim other songs briefly ---
  rows.forEach((row, idx) => {
    if (idx !== oldIdx && idx !== i) {
      row.classList.add('spotlight-dim');
    }
  });

  // --- Phase 2: After 150ms, rebuild + animate new song ---
  setTimeout(() => {
    build(i);
    const newRows = document.getElementById('pl').querySelectorAll('.row');
    const newRow = newRows[i];

    // New song: takeover rise + glow
    newRow.classList.add('takeover-new', 'takeover-glow');

    // Remove spotlight dims after 300ms
    setTimeout(() => {
      newRows.forEach(row => row.classList.remove('spotlight-dim'));
    }, 300);

    // Cover fly: FLIP from song cover to player
    flyCover(newRow, i);

    // Player bar glow
    const bar = document.getElementById('mplayer');
    bar.classList.add('bar-glow');
    setTimeout(() => bar.classList.remove('bar-glow'), 500);

    updatePlayer(S[i]);
  }, 150);
});

// FLIP cover fly
function flyCover(newRow, idx) {
  const cv = newRow.querySelector('.cv');
  const mc = document.getElementById('mcv');
  if (!cv || !mc) return;

  // FINAL position (player cover)
  const to = mc.getBoundingClientRect();
  // FIRST position (song cover)
  const from = cv.getBoundingClientRect();

  // Create clone at "from" position
  const clone = document.createElement('div');
  clone.className = 'fly-cover';
  clone.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;color:rgba(255,255,255,.7)">music_note</span>';
  clone.style.cssText = 'display:flex;align-items:center;justify-content:center;' +
    'left:' + from.left + 'px;top:' + from.top + 'px;' +
    'width:' + from.width + 'px;height:' + from.height + 'px;';
  document.body.appendChild(clone);

  // FLIP: compute delta
  const dx = to.left - from.left;
  const dy = to.top - from.top;
  const sx = to.width / from.width;
  const sy = to.height / from.height;

  // Arc trajectory via translate with bezier easing
  clone.animate([
    {
      transform: 'translate(0, 0) scale(1) rotate(0deg)',
      opacity: 1,
      boxShadow: '0 2px 8px rgba(0,0,0,.15)'
    },
    {
      transform: 'translate(' + (dx * 0.45) + 'px, ' + (dy * 0.3 - 28) + 'px) scale(0.72) rotate(-6deg)',
      opacity: .85,
      boxShadow: '0 8px 24px rgba(103,80,164,.25)',
      offset: 0.45
    },
    {
      transform: 'translate(' + dx + 'px, ' + dy + 'px) scale(' + sx + ',' + sy + ') rotate(0deg)',
      opacity: .5,
      boxShadow: '0 1px 4px rgba(0,0,0,.1)'
    }
  ], {
    duration: 480,
    easing: 'cubic-bezier(.4,0,.2,1)',
    fill: 'forwards'
  }).onfinish = () => {
    clone.remove();
    // Player catch pulse
    mc.classList.add('catch');
    setTimeout(() => mc.classList.remove('catch'), 400);
  };
}

function resetAll() {
  active = 0;
  build(0);
}

build(0);
</script>
</body>
</html>
