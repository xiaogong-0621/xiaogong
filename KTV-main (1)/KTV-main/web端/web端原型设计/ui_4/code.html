<!DOCTYPE html>

<body class="bg-surface text-on-surface antialiased overflow-hidden flex h-screen">

<nav class="h-screen w-64 fixed left-0 top-0 bg-[#f7f9fb] dark:bg-slate-950 flex flex-col p-6 gap-y-8 pt-24 z-50"><div class="flex flex-col gap-1 mb-2">
<h1 class="text-2xl font-bold tracking-tighter text-[#191c1e] dark:text-white">Azure Echo</h1>
<p class="text-xs text-on-surface-variant font-medium">Vocal Suite</p>
</div>
<div class="space-y-2">
<a class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#006399] hover:bg-[#f2f4f6] rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-medium">探索歌曲</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 bg-[#ffffff] dark:bg-slate-800 text-[#006399] dark:text-[#4fb3ff] rounded-2xl shadow-sm scale-98 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">trending_up</span>
<span class="font-medium font-bold">热门榜单</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#006399] hover:bg-[#f2f4f6] rounded-2xl transition-all duration-200" href="#">

</a>
<a class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#006399] hover:bg-[#f2f4f6] rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined">meeting_room</span>
<span class="font-medium">当前房间</span>
</a>
</div>
<div class="mt-auto space-y-4">
<button class="w-full bg-primary-fixed text-on-primary-fixed py-4 rounded-full font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">queue_music</span>
                快速点歌
            </button>
</div>

<main class="flex-1 flex flex-col h-screen relative ml-64">

<header class="flex justify-between items-center w-full px-8 py-4 docked full-width top-0 sticky z-40 bg-[#f7f9fb]/70 dark:bg-slate-900/70 backdrop-blur-xl no-border shadow-none bg-surface flat no shadows">
<div class="flex-1 flex items-center">
<!-- Search Bar Placeholder -->
<div class="relative w-full max-w-md">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full bg-surface-container-high text-on-surface placeholder-outline rounded-lg py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primary/20 border-0 font-body text-body-lg" disabled="" placeholder="搜索..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full text-[#006399] dark:text-[#4FB3FF] hover:bg-white/50 dark:hover:bg-slate-800/50 transition-colors scale-98 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button><button class="p-2 rounded-full text-[#006399] dark:text-[#4FB3FF] hover:bg-white/50 dark:hover:bg-slate-800/50 transition-colors scale-98 active:scale-95 duration-200">

</button>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden shrink-0 border border-outline-variant/15"><div class="w-full h-full bg-slate-200 flex items-center justify-center text-[8px] text-slate-500 text-center leading-tight px-1">User Avatar</div></div>
</div>
</header>

<div class="flex-1 overflow-y-auto px-8 pb-32 pt-6">

<div class="mb-10 flex flex-col gap-6">

</div>
</div>

<div class="flex flex-col gap-10 max-w-4xl">
<!-- Row 1 -->
<div class="flex items-center gap-6 group hover:bg-surface-container-lowest p-4 -mx-4 rounded-lg transition-colors cursor-pointer">
<span class="text-3xl font-black text-tertiary-container font-display w-12 text-center">1</span>
<div class="w-16 h-16 rounded-DEFAULT bg-[#eceef0] shrink-0 shadow-sm"></div>
<div class="flex-1 min-w-0">
<h3 class="text-xl font-bold text-on-surface truncate font-headline mb-1">歌曲名称</h3>
<p class="text-sm text-on-surface-variant truncate font-label">歌手名称</p>
</div>
<div class="text-right mr-4 hidden sm:block">
<span class="text-sm font-medium text-on-surface-variant font-label">999K 次播放</span>
</div>
<button class="px-6 py-3 rounded-full bg-primary text-on-primary font-bold shadow-sm hover:bg-secondary transition-colors shrink-0 font-label">点歌</button>
</div>
<!-- Row 2 -->
<div class="flex items-center gap-6 group hover:bg-surface-container-lowest p-4 -mx-4 rounded-lg transition-colors cursor-pointer">
<span class="text-3xl font-bold text-on-surface-variant font-display w-12 text-center">2</span>
<div class="w-16 h-16 rounded-DEFAULT bg-[#eceef0] shrink-0 shadow-sm"></div>
<div class="flex-1 min-w-0">
<h3 class="text-xl font-bold text-on-surface truncate font-headline mb-1">歌曲名称</h3>
<p class="text-sm text-on-surface-variant truncate font-label">歌手名称</p>
</div>
<div class="text-right mr-4 hidden sm:block">
<span class="text-sm font-medium text-on-surface-variant font-label">850K 次播放</span>
</div>
<button class="px-6 py-3 rounded-full bg-primary-fixed text-on-primary-fixed font-bold hover:bg-primary-fixed-dim transition-colors shrink-0 font-label">点歌</button>
</div>
<!-- Row 3 -->
<div class="flex items-center gap-6 group hover:bg-surface-container-lowest p-4 -mx-4 rounded-lg transition-colors cursor-pointer">
<span class="text-3xl font-bold text-on-surface-variant font-display w-12 text-center">3</span>
<div class="w-16 h-16 rounded-DEFAULT bg-[#eceef0] shrink-0 shadow-sm"></div>

</div>

<div class="w-16 h-16 rounded-DEFAULT bg-[#eceef0] shrink-0 shadow-sm"></div>
<div class="flex-1 min-w-0">
<h3 class="text-xl font-bold text-on-surface truncate font-headline mb-1">歌曲名称</h3>

</div>
<div class="text-right mr-4 hidden sm:block">
<span class="text-sm font-medium text-on-surface-variant font-label">600K 次播放</span>
</div>
<button class="px-6 py-3 rounded-full bg-primary-fixed text-on-primary-fixed font-bold hover:bg-primary-fixed-dim transition-colors shrink-0 font-label">点歌</button>
</div>
</div>
</div>

<footer class="fixed bottom-0 left-0 w-full z-50 h-24 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex justify-between items-center px-12 pb-safe rounded-t-[3rem] shadow-[0_-8px_32px_rgba(25,28,30,0.06)]">

</div>

<div class="flex items-center gap-8">
<button class="text-slate-400 hover:scale-110 transition-transform"><span class="material-symbols-outlined">skip_previous</span></button>

</div>
