<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Azure Echo - 当前房间</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "secondary-container": "#64a1ff",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#004a75",
                        "on-primary-fixed": "#001d32",
                        "surface-tint": "#006399",
                        "primary": "#006399",
                        "tertiary-container": "#e39f14",
                        "on-secondary-container": "#003670",
                        "surface-container": "#eceef0",
                        "error-container": "#ffdad6",
                        "outline-variant": "#bfc7d2",
                        "primary-fixed": "#cde5ff",
                        "secondary": "#005db7",
                        "error": "#ba1a1a",
                        "on-surface": "#191c1e",
                        "on-tertiary-fixed-variant": "#604100",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#3f4851",
                        "surface": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-fixed": "#d6e3ff",
                        "on-error": "#ffffff",
                        "inverse-primary": "#95ccff",
                        "background": "#f7f9fb",
                        "tertiary-fixed-dim": "#ffba3f",
                        "tertiary-fixed": "#ffdeae",
                        "surface-dim": "#d8dadc",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-low": "#f2f4f6",
                        "primary-container": "#4fb3ff",
                        "on-background": "#191c1e",
                        "on-tertiary-container": "#583a00",
                        "on-primary-container": "#00436a",
                        "tertiary": "#7f5600",
                        "primary-fixed-dim": "#95ccff",
                        "secondary-fixed-dim": "#a9c7ff",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#281900",
                        "on-secondary-fixed-variant": "#00468c",
                        "inverse-surface": "#2d3133",
                        "outline": "#6f7882",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001b3d"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- TopNavBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-[#f7f9fb] dark:bg-slate-950 flex justify-between items-center w-full px-8 py-4 font-['Plus_Jakarta_Sans'] text-sm tracking-wide">
<div class="flex items-center gap-8">
<span class="text-xl font-bold tracking-tighter text-[#191c1e] dark:text-white">声域友</span>
<div class="relative w-96">
<input class="w-full bg-[#eceef0] border-none rounded-full px-6 py-2 focus:ring-2 focus:ring-primary" placeholder="搜索歌曲、歌手..." type="text"/>
<span class="material-symbols-outlined absolute right-4 top-2 text-slate-400">search</span>
</div>
</div>
<div class="flex items-center gap-6">
<button class="relative hover:bg-[#eceef0] p-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-[#006399]">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
</button>
<div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center text-[10px] text-slate-500 font-bold border-2 border-white shadow-sm">用户头像</div>
</div>
</header>
<!-- SideNavBar -->
<nav class="h-screen w-64 fixed left-0 top-0 bg-[#f7f9fb] dark:bg-slate-950 flex flex-col p-6 gap-y-8 pt-24">
<div class="space-y-2">
<a class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#006399] hover:bg-[#f2f4f6] rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-medium">探索歌曲</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#006399] hover:bg-[#f2f4f6] rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined">trending_up</span>
<span class="font-medium">热门榜单</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#006399] hover:bg-[#f2f4f6] rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined">favorite</span>
<span class="font-medium">我的收藏</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 bg-[#ffffff] dark:bg-slate-800 text-[#006399] dark:text-[#4fb3ff] rounded-2xl shadow-sm scale-98 transition-all duration-200" href="#">
<span class="material-symbols-outlined">meeting_room</span>
<span class="font-medium">当前房间</span>
</a>
</div>
<div class="mt-auto space-y-4">
<button class="w-full bg-primary-fixed text-on-primary-fixed py-4 rounded-full font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">queue_music</span>
                快速点歌
            </button>
</div>
</nav>
<!-- Main Canvas Area -->
<main class="ml-64 pt-24 px-10 pb-32">
<div class="max-w-6xl mx-auto">
<!-- Header Section -->
<div class="mb-10">
<h1 class="text-4xl font-extrabold tracking-tight mb-4 text-on-surface">当前房间</h1>
<div class="flex gap-8 text-sm font-medium text-on-surface-variant">
<span class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-sm">label</span> 包厢号: 888
                    </span>
<span class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-sm">format_list_bulleted</span> 已点歌曲: 12
                    </span>
</div>
</div>
<!-- Bento Grid Layout for Room Content -->
<div class="grid grid-cols-12 gap-8">
<!-- Current Playing Card (Hero) -->
<div class="col-span-12 bg-surface-container-lowest rounded-xl p-8 shadow-sm flex gap-8 items-center border border-transparent lg:col-span-12">
<div class="w-48 h-48 bg-slate-200 rounded-lg flex items-center justify-center text-slate-400 flex-shrink-0 text-center font-bold px-4">专辑封面</div>
<div class="flex-grow">
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="text-3xl font-bold mb-1">歌曲名称</h2>
<p class="text-on-surface-variant">歌手名称</p>
</div>
<div class="flex gap-2">
<button class="p-3 bg-surface-container rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">replay</span>
</button>
<button class="p-3 bg-primary text-white rounded-full hover:opacity-90 transition-opacity flex items-center gap-2 px-6 font-bold">
<span class="material-symbols-outlined">skip_next</span> 切歌
                                </button>
</div>
</div>
<!-- Progress Bar -->
<div class="space-y-2">
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full"></div>
</div>
<div class="flex justify-between text-xs font-bold text-slate-400 tracking-widest">
<span>00:00</span>
<span>04:30</span>
</div>
</div>
</div>
</div>
<!-- Room Queue Info (Secondary Card) -->
<!-- Queue List Section -->
<div class="col-span-12 space-y-4">
<h3 class="text-xl font-bold px-2">播放列表</h3>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden">
<!-- Queue Items -->
<div class="flex items-center px-8 py-6 hover:bg-surface-container-low transition-colors group">
<span class="w-8 text-slate-400 font-bold">01</span>
<div class="w-12 h-12 bg-slate-200 rounded-lg mx-6 flex items-center justify-center text-[8px] text-slate-500 text-center px-1">专辑封面</div>
<div class="flex-grow grid grid-cols-4 items-center">
<span class="font-bold">歌曲名称</span>
<span class="text-on-surface-variant">歌手名称</span>
<span class="text-sm text-slate-400">点播者: 用户昵称</span>
<div class="flex justify-end gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="text-primary hover:scale-110 transition-transform"><span class="material-symbols-outlined">vertical_align_top</span></button>
<button class="text-error hover:scale-110 transition-transform"><span class="material-symbols-outlined">delete</span></button>
</div>
</div>
</div>
<div class="flex items-center px-8 py-6 hover:bg-surface-container-low transition-colors group">
<span class="w-8 text-slate-400 font-bold">02</span>
<div class="w-12 h-12 bg-slate-200 rounded-lg mx-6 flex items-center justify-center text-[8px] text-slate-500 text-center px-1">专辑封面</div>
<div class="flex-grow grid grid-cols-4 items-center">
<span class="font-bold">歌曲名称</span>
<span class="text-on-surface-variant">歌手名称</span>
<span class="text-sm text-slate-400">点播者: 用户昵称</span>
<div class="flex justify-end gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="text-primary hover:scale-110 transition-transform"><span class="material-symbols-outlined">vertical_align_top</span></button>
<button class="text-error hover:scale-110 transition-transform"><span class="material-symbols-outlined">delete</span></button>
</div>
</div>
</div>
<div class="flex items-center px-8 py-6 hover:bg-surface-container-low transition-colors group">
<span class="w-8 text-slate-400 font-bold">03</span>
<div class="w-12 h-12 bg-slate-200 rounded-lg mx-6 flex items-center justify-center text-[8px] text-slate-500 text-center px-1">专辑封面</div>
<div class="flex-grow grid grid-cols-4 items-center">
<span class="font-bold">歌曲名称</span>
<span class="text-on-surface-variant">歌手名称</span>
<span class="text-sm text-slate-400">点播者: 用户昵称</span>
<div class="flex justify-end gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="text-primary hover:scale-110 transition-transform"><span class="material-symbols-outlined">vertical_align_top</span></button>
<button class="text-error hover:scale-110 transition-transform"><span class="material-symbols-outlined">delete</span></button>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 left-0 w-full z-50 h-24 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex justify-between items-center px-12 pb-safe rounded-t-[3rem] shadow-[0_-8px_32px_rgba(25,28,30,0.06)]">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#006399] to-[#005db7]"></div>
<!-- Now Playing Info -->
<div class="flex items-center gap-4 w-1/4">
<div class="w-12 h-12 bg-slate-200 rounded-lg flex items-center justify-center text-[8px] text-slate-500 text-center px-1">专辑封面</div>
<div class="overflow-hidden">
<p class="font-['Manrope'] text-xs font-bold uppercase tracking-widest text-[#006399]">Playing</p>
<p class="text-sm font-bold truncate">歌曲名称</p>
</div>
</div>
<!-- Controls -->
<div class="flex items-center gap-8">
<button class="text-slate-400 hover:scale-110 transition-transform"><span class="material-symbols-outlined">skip_previous</span></button>
<button class="text-[#006399] hover:scale-110 transition-transform scale-125"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_circle</span></button>
<button class="text-slate-400 hover:scale-110 transition-transform"><span class="material-symbols-outlined">skip_next</span></button>
</div>
<!-- Volume & Actions -->
<div class="flex items-center gap-6 w-1/4 justify-end">
<div class="flex items-center gap-3 w-32">
<span class="material-symbols-outlined text-slate-400">volume_up</span>
<div class="h-1 flex-grow bg-surface-container rounded-full">
<div class="h-full w-3/4 bg-primary rounded-full relative">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-primary border-2 border-white rounded-full shadow-sm"></div>
</div>
</div>
</div>
<button class="text-slate-400 hover:scale-110 transition-transform"><span class="material-symbols-outlined">lyrics</span></button>
</div>
</footer>
<!-- Sonic Queue FAB -->
</body></html>
